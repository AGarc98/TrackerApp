<svg width="1024" height="1024" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for the icon (optional, but standard for app icons) -->
  <rect width="100" height="100" rx="20" fill="#0f172a" />
  
  <!-- Dumbbell Shackle (Top) -->
  <path 
    d="M25 20 H75 M25 10 V30 M75 10 V30" 
    stroke="#3b82f6" 
    stroke-width="10" 
    stroke-linecap="round" 
  />
  
  <!-- Lock Body (Bottom) -->
  <rect 
    x="20" 
    y="45" 
    width="60" 
    height="45" 
    rx="12" 
    fill="#3b82f6" 
  />
  
  <!-- Keyhole (Minimalist) -->
  <circle cx="50" cy="62" r="4" fill="white" fill-opacity="0.5" />
  <rect x="48" y="62" width="4" height="10" rx="2" fill="white" fill-opacity="0.5" />
</svg>
